gateway:
  sn: "GWD001"
  os: "linux"
  arch: "arm64"
  soc: "rk3568"

server:
  host: "0.0.0.0"
  port: 9000
  mode: "debug"  # debug or release

database:
  type: "sqlite3"
  sqlite3:
    path: "./data/edge5.db"

cache:
  type: "boltdb"
  boltdb:
    path: "./data/cache.db"
    bucket: "cache_queue"

mqtt:
  enabled: true
  broker: "mqtt://127.0.0.1:1883"
  protocol: "mqtt://"
  host: ""
  port: 1883
  username: ""
  password: ""
  client_id: "edge5-gateway"
  keep_alive: 60
  qos: 0
  ssl: false
  ssl_verify: true
  alpn_tag: ""
  cert_type: ""
  ca_file: ""
  cert_file: ""
  key_file: ""
  version: "5.0"
  connect_timeout: 10
  auto_reconnect: true
  reconnect_period: 4000
  clean_start: false
  session_expiry: 7200
  receive_max: 0
  max_packet_size: 0
  topic_alias_max: 0
  request_response: false
  request_problem: false

log:
  level: "info"
  path: "./logs"
  pattern: "%Y%m%d.log"
  max_age: 7
  rotation_time: 24
  compress: false

connector:
  reconnect_interval: 15000
  base_delay: 1000
  max_delay: 60000
  factor: 2

plugin:
  enabled: true
  grpc_port: 50051
  plugins_dir: "./plugins"

jwt:
  secret: "edge5-secret-key-change-in-production"
  expire: 24
  refresh_expire: 168

captcha:
  captcha_length: 4
  expire_time: 300
